<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown — Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ─── COUNTDOWN COMPONENT ─────────────────────────────────
       Klistra in .countdown-section i valfri kampanjsida.
       Sätt TARGET_DATE i <script> längst ner.
    ──────────────────────────────────────────────────────── */

    .countdown-section {
      width: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 40px;
      gap: 48px;
    }

    .countdown-label {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .countdown-grid {
      display: flex;
      gap: 0;
      align-items: flex-start;
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 0 40px;
      position: relative;
    }

    .countdown-unit:not(:last-child)::after {
      content: ':';
      position: absolute;
      right: -6px;
      top: 8px;
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 200;
      color: rgba(255,255,255,0.15);
      line-height: 1;
    }

    .countdown-number {
      font-size: clamp(56px, 9vw, 120px);
      font-weight: 200;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .countdown-unit-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* Subtil linje ovanför */
    .countdown-divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
    }

    /* Expired state */
    .countdown-expired {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 600px) {
      .countdown-unit {
        padding: 0 20px;
      }
      .countdown-unit:not(:last-child)::after {
        font-size: 32px;
        right: -4px;
        top: 6px;
      }
    }
  </style>
</head>
<body>

  <!-- ─── KLISTRA IN DETTA I KAMPANJSIDAN ────────────────── -->
  <section class="countdown-section">
    <span class="countdown-label" id="countdown-tagline">Lanserar om</span>

    <div class="countdown-grid" id="countdown-grid">
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-days">00</span>
        <span class="countdown-unit-label">Dagar</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-hours">00</span>
        <span class="countdown-unit-label">Timmar</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-minutes">00</span>
        <span class="countdown-unit-label">Minuter</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-number" id="cd-seconds">00</span>
        <span class="countdown-unit-label">Sekunder</span>
      </div>
    </div>

    <div class="countdown-divider"></div>
  </section>
  <!-- ────────────────────────────────────────────────────── -->

  <script>
    // ─── KONFIGURERA HÄR ────────────────────────────────────
    const TARGET_DATE = new Date('2026-04-01T09:00:00');  // ← Sätt rätt datum
    const LABEL_TEXT  = 'Lanserar om';                    // ← Valfri text ovan klockan
    const UNIT_LABELS = ['Dagar', 'Timmar', 'Minuter', 'Sekunder']; // ← sv/en/annat
    // ────────────────────────────────────────────────────────

    const els = {
      tagline: document.getElementById('countdown-tagline'),
      grid:    document.getElementById('countdown-grid'),
      days:    document.getElementById('cd-days'),
      hours:   document.getElementById('cd-hours'),
      minutes: document.getElementById('cd-minutes'),
      seconds: document.getElementById('cd-seconds'),
    };

    // Sätt labels
    els.tagline.textContent = LABEL_TEXT;
    const unitLabels = document.querySelectorAll('.countdown-unit-label');
    unitLabels.forEach((el, i) => el.textContent = UNIT_LABELS[i]);

    function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

    function update() {
      const now  = new Date();
      const diff = TARGET_DATE - now;

      if (diff <= 0) {
        els.grid.innerHTML = `<span class="countdown-expired">Nu live</span>`;
        els.tagline.style.display = 'none';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      els.days.textContent    = pad(d);
      els.hours.textContent   = pad(h);
      els.minutes.textContent = pad(m);
      els.seconds.textContent = pad(s);
    }

    update();
    setInterval(update, 1000);
  </script>

</body>
</html>
